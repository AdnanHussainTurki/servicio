name: Release

# Build + publish desktop apps for macOS (universal), Linux, and Windows on a
# version tag (or manual dispatch). Each job uses tauri-action, which:
#   - builds the app (running beforeBuildCommand → the frontend build),
#   - signs the updater artifacts with the minisign key (env vars below),
#   - creates/updates the GitHub Release for the tag, and
#   - writes/merges latest.json (the manifest the in-app updater fetches).
#
# The in-app updater endpoint points at:
#   https://github.com/AdnanHussainTurki/servicio/releases/latest/download/latest.json
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   TAURI_SIGNING_PRIVATE_KEY           contents of .secrets/servicio-updater.key
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD  the key's password ("" if none)
# Without these the build fails at the updater-signing step.
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

# tauri-action needs write access to create/update the GitHub Release.
permissions:
  contents: write

# Enable updater artifacts for CI builds only, via the merged config file
# src-tauri/tauri.updater-ci.conf.json passed with `--config`. This keeps local
# `npm run tauri build` working without the signing key.
jobs:
  macos-universal:
    name: macOS universal build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (stable, both Apple arches)
        uses: dtolnay/rust-toolchain@stable

      # Universal build needs both targets' std (rustup-only cross-arch std).
      - name: Add Apple targets
        run: rustup target add x86_64-apple-darwin aarch64-apple-darwin

      - uses: Swatinem/rust-cache@v2

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Install frontend dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Sync version to tag
        if: startsWith(github.ref, 'refs/tags/')
        working-directory: apps/desktop
        run: node scripts/set-version.mjs ${{ github.ref_name }}

      # Stage the per-arch + lipo'd universal daemon sidecars before bundling.
      - name: Prepare universal sidecar
        working-directory: apps/desktop
        run: npm run prepare-sidecar:universal

      - name: Build, sign, and publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop
          tagName: ${{ github.ref_name }}
          releaseName: "Servicio ${{ github.ref_name }}"
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          args: --target universal-apple-darwin --config src-tauri/tauri.updater-ci.conf.json

  linux:
    name: Linux build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      # Tauri v2 Linux system dependencies (webkit2gtk 4.1, GTK, appindicator,
      # plus packaging tools for .deb/.rpm/.AppImage).
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            libssl-dev \
            build-essential \
            file \
            wget

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Install frontend dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Sync version to tag
        if: startsWith(github.ref, 'refs/tags/')
        working-directory: apps/desktop
        run: node scripts/set-version.mjs ${{ github.ref_name }}

      - name: Prepare sidecar
        working-directory: apps/desktop
        run: npm run prepare-sidecar

      - name: Build, sign, and publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop
          tagName: ${{ github.ref_name }}
          releaseName: "Servicio ${{ github.ref_name }}"
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          args: --config src-tauri/tauri.updater-ci.conf.json

  windows:
    name: Windows build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Install frontend dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Sync version to tag
        if: startsWith(github.ref, 'refs/tags/')
        working-directory: apps/desktop
        run: node scripts/set-version.mjs ${{ github.ref_name }}

      # prepare-sidecar.sh is bash; run it via Git Bash (default on the runner).
      - name: Prepare sidecar
        working-directory: apps/desktop
        shell: bash
        run: npm run prepare-sidecar

      - name: Build, sign, and publish
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop
          tagName: ${{ github.ref_name }}
          releaseName: "Servicio ${{ github.ref_name }}"
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          args: --config src-tauri/tauri.updater-ci.conf.json
