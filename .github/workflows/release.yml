name: Release

# Build + publish desktop apps for macOS (universal), Linux, and Windows on a
# version tag (or manual dispatch). Each job appends its artifacts to the same
# GitHub Release for the tag.
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

# The release job needs write access to create/update the GitHub Release.
permissions:
  contents: write

jobs:
  macos-universal:
    name: macOS universal build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain (stable, both Apple arches)
        uses: dtolnay/rust-toolchain@stable

      # Universal build needs both targets' std (rustup-only cross-arch std).
      - name: Add Apple targets
        run: rustup target add x86_64-apple-darwin aarch64-apple-darwin

      - uses: Swatinem/rust-cache@v2

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Install frontend dependencies
        working-directory: apps/desktop
        run: npm ci

      # Builds the universal sidecar (prepare-sidecar:universal) then
      # `tauri build --target universal-apple-darwin`. The PATH prefix forces
      # the rustup toolchain (Homebrew rust lacks cross-arch std).
      #
      # NOTE: this produces an UNSIGNED build (no Apple Developer cert). The
      # resulting .dmg/.app run locally after a right-click -> Open (or
      # `xattr -dr com.apple.quarantine <app>`). To ship a signed + notarized
      # build, add the APPLE_* signing env vars as repository secrets and export
      # them in this step — see docs/RELEASING.md for the full list and steps.
      - name: Build universal app
        working-directory: apps/desktop
        run: PATH="$HOME/.cargo/bin:$PATH" npm run build:universal

      # Zip the .app for upload (a raw .app directory can't be a release asset).
      - name: Zip .app bundle
        working-directory: apps/desktop/src-tauri/target/universal-apple-darwin/release/bundle/macos
        run: zip -ry Servicio-macos.app.zip *.app

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            apps/desktop/src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
            apps/desktop/src-tauri/target/universal-apple-darwin/release/bundle/macos/Servicio-macos.app.zip

  linux:
    name: Linux build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      # Tauri v2 Linux system dependencies (webkit2gtk 4.1, GTK, appindicator,
      # plus packaging tools for .deb/.rpm/.AppImage).
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            libssl-dev \
            build-essential \
            file \
            wget

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Install frontend dependencies
        working-directory: apps/desktop
        run: npm ci

      # Stage the host (x86_64-unknown-linux-gnu) daemon sidecar, then bundle.
      - name: Build app
        working-directory: apps/desktop
        run: |
          npm run prepare-sidecar
          npm run tauri build

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            apps/desktop/src-tauri/target/release/bundle/deb/*.deb
            apps/desktop/src-tauri/target/release/bundle/rpm/*.rpm
            apps/desktop/src-tauri/target/release/bundle/appimage/*.AppImage

  windows:
    name: Windows build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Install frontend dependencies
        working-directory: apps/desktop
        run: npm ci

      # prepare-sidecar.sh is bash; run it via Git Bash (default shell on
      # windows-latest runners). Stages the host daemon, then bundles .msi/.exe.
      - name: Build app
        working-directory: apps/desktop
        shell: bash
        run: |
          npm run prepare-sidecar
          npm run tauri build

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            apps/desktop/src-tauri/target/release/bundle/msi/*.msi
            apps/desktop/src-tauri/target/release/bundle/nsis/*.exe
